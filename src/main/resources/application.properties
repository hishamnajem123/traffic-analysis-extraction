# -------------------------
# Waze API Configuration
# -------------------------
# Base URL for Quarkus REST client
quarkus.rest-client.waze-api.url=https://www.waze.com
# Optional REST client tuning
quarkus.rest-client.waze-api.connect-timeout=5
quarkus.rest-client.waze-api.read-timeout=10
# Bounding box (Ottawa area example)
waze.bbox.top=45.42857864558735
waze.bbox.bottom=45.36493380732386
waze.bbox.left=-76.10435485839845
waze.bbox.right=-75.31333923339845
# Waze query params
waze.env=na
waze.types=alerts
# Jitter (in degrees)
# ~0.0001 ≈ 10–11 meters
# ~0.001  ≈ 100–110 meters
waze.jitter=0.0005
# -------------------------
# Quarkus Scheduler
# -------------------------
quarkus.scheduler.enabled=true
# -------------------------
# Logging
# -------------------------
quarkus.log.level=INFO
# Debug only your code
quarkus.log.category."com.extraction".level=DEBUG
# -------------------------
# Micrometer / Metrics
# -------------------------
quarkus.micrometer.export.prometheus.enabled=true
# Default endpoint: /q/metrics
# quarkus.micrometer.export.prometheus.path=/q/metrics